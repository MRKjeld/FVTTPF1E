<div class="dice-roll midi-damage-roll">
  {{#if flavor}}
  <div class="dice-flavor">{{flavor}}</div>
  {{/if}}
  <div class="dice-result">
    <div class="dice-formula">{{formula}}</div>
    <h4 class="dice-total">{{total}}{{#if damageTypeIcon}}<dnd5e-icon class="midi-damage-type-icon" src="{{damageTypeIcon}}" aria-label="{{damageTypeLabel}}" data-tooltip="{{damageTypeLabel}}"></dnd5e-icon>{{/if}}</h4>
    <div class="midi-dice-tooltip">
      <section class="tooltip-part">
      </section>
    </div>
    {{{tooltip}}}
  </div>
</div>
